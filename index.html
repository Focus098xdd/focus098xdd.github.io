<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bio</title>
<link href="https://fonts.cdnfonts.com/css/minecraft-4" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e12;
    --bg-card: #0f1620;
    --border: #1c2630;
    --blue: #4ea8de;
    --mint: #4ee8c5;
    --text: #c8d6e0;
    --text-dim: #6c7f8f;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    background:
      radial-gradient(circle at 15% 10%, rgba(78,168,222,0.10), transparent 40%),
      radial-gradient(circle at 85% 85%, rgba(78,232,197,0.10), transparent 40%),
      var(--bg);
    color: var(--text);
    font-family: 'Minecraft', 'Segoe UI', system-ui, -apple-system, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 16px;
  }

  .card {
    width: 100%;
    max-width: 440px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 36px 32px;
    box-shadow: 0 0 0 1px rgba(78,232,197,0.04), 0 20px 60px rgba(0,0,0,0.5);
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: "";
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
    background: linear-gradient(90deg, var(--blue), var(--mint));
  }

  .avatar {
    width: 96px;
    height: 96px;
    border-radius: 50%;
    margin: 0 auto 20px;
    background: linear-gradient(135deg, var(--blue), var(--mint));
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 36px;
    font-weight: 700;
    color: #06141a;
    box-shadow: 0 0 0 4px rgba(78,232,197,0.08), 0 0 30px rgba(78,232,197,0.15);
  }

  .name {
    text-align: center;
    font-size: 24px;
    font-weight: 700;
    color: #eaf6f4;
    margin: 0 0 4px;
    letter-spacing: 0.3px;
  }

  .role {
    text-align: center;
    font-size: 14px;
    color: var(--mint);
    margin: 0 0 18px;
    font-weight: 500;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  .bio {
    text-align: center;
    font-size: 14.5px;
    line-height: 1.6;
    color: var(--text-dim);
    margin: 0 0 26px;
  }

  .tags {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    margin-bottom: 26px;
  }

  .tag {
    font-size: 12px;
    padding: 5px 12px;
    border-radius: 999px;
    border: 1px solid var(--border);
    background: rgba(78,168,222,0.06);
    color: var(--blue);
  }

  .divider {
    height: 1px;
    background: var(--border);
    margin: 0 0 22px;
  }

  .links {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .link {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 14px;
    border-radius: 10px;
    border: 1px solid var(--border);
    text-decoration: none;
    color: var(--text);
    font-size: 14px;
    font-weight: 500;
    transition: border-color 0.2s, background 0.2s, transform 0.2s;
    background: rgba(255,255,255,0.01);
  }

  .link:hover {
    border-color: var(--mint);
    background: rgba(78,232,197,0.06);
    transform: translateY(-1px);
  }

  .link .icon {
    width: 20px;
    height: 20px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--mint);
  }

  .footer {
    text-align: center;
    margin-top: 26px;
    font-size: 12px;
    color: var(--text-dim);
    letter-spacing: 0.4px;
  }

  .footer span {
    color: var(--blue);
  }

  .lang-checkbox {
    display: none;
  }

  .lang-switch {
    position: fixed;
    top: 20px;
    right: 20px;
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 6px 10px;
    border-radius: 999px;
    border: 1px solid var(--border);
    background: var(--bg-card);
    cursor: pointer;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.5px;
    color: var(--text-dim);
    user-select: none;
    z-index: 10;
  }

  .lang-switch:hover {
    border-color: var(--mint);
  }

  .lang-switch span {
    padding: 3px 8px;
    border-radius: 999px;
  }

  .lang-switch-en {
    background: linear-gradient(90deg, var(--blue), var(--mint));
    color: #06141a;
  }

  #lang-toggle:checked ~ .lang-switch .lang-switch-en {
    background: none;
    color: var(--text-dim);
  }

  #lang-toggle:checked ~ .lang-switch .lang-switch-th {
    background: linear-gradient(90deg, var(--blue), var(--mint));
    color: #06141a;
  }

  .lang-th {
    display: none;
  }

  #lang-toggle:checked ~ .card .lang-en {
    display: none;
  }

  #lang-toggle:checked ~ .card .lang-th {
    display: block;
  }
</style>
</head>
